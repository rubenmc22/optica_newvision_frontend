<section class="ventas-summary">
  <div class="ventas-summary__grid">
    <article
      *ngFor="let item of resumenItems"
      class="modern-card ventas-summary__card"
      [ngClass]="item.accentClass"
      (click)="abrirRuta(item.route)">
      <div class="card-content">
        <div class="card-icon">
          <i [class]="item.icono"></i>
        </div>
        <div class="card-info">
          <div class="card-value">{{ item.total !== null ? item.total : '—' }}</div>
          <div class="card-label">{{ item.titulo }}</div>
          <div class="card-description">{{ item.descripcion }}</div>
          <div class="card-footer">
            <span class="card-action">Abrir flujo</span>
            <i class="fas fa-arrow-right"></i>
          </div>
        </div>
        <div class="card-glow"></div>
      </div>
    </article>
  </div>
</section>
