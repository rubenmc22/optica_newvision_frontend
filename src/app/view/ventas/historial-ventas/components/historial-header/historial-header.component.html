<div class="historial-presupuesto-header">
  <div class="historial-presupuesto-header-content">
    <div class="historial-presupuesto-header-title">
      <i class="bi bi-clock-history"></i>
      <div class="historial-presupuesto-header-text">
        <h1>Historial de Ventas</h1>
        <div class="historial-presupuesto-header-subtitle">Consulta y gestiona el historial completo de transacciones</div>
      </div>
    </div>
    <div class="historial-presupuesto-header-actions">
      <div class="historial-presupuesto-header-filters">
        <button class="btn historial-resumen-btn" (click)="openResumen.emit()" [disabled]="resumenCargando">
          <i class="bi" [class.bi-graph-up]="!resumenCargando" [class.bi-arrow-repeat]="resumenCargando" [class.spin-icon]="resumenCargando"></i>
          Resumen Financiero
        </button>

        <button class="btn-icon-refresh" (click)="refreshStats.emit()" [disabled]="estadisticasCargando" [class.loading]="estadisticasCargando" title="Actualizar estadísticas">
          <div class="icon-container">
            <svg class="refresh-icon" viewBox="0 0 24 24">
              <path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
            </svg>
            <div class="loading-spinner" *ngIf="estadisticasCargando"></div>
          </div>
          <div class="status-indicator"></div>
        </button>
      </div>
    </div>
  </div>
</div>
