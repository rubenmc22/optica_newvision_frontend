<div class="row g-3 mb-4 estadisticas-grid">
  <div class="col-6 col-md-3">
    <div class="stat-card stat-primary">
      <div class="stat-icon">
        <i class="bi bi-cart-check"></i>
      </div>
      <div class="stat-content">
        <div class="stat-value">{{ totalVentas | number }}</div>
        <div class="stat-label">Total Ventas</div>
      </div>
      <div class="stat-glow"></div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="stat-card stat-success">
      <div class="stat-icon">
        <i class="bi bi-check-circle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-value">{{ ventasCompletadas }}</div>
        <div class="stat-label">Completadas</div>
        <div class="stat-percentage">{{ ((ventasCompletadas / (totalVentas || 1)) * 100) | number:'1.0-0' }}% del total</div>
      </div>
      <div class="stat-progress">
        <div class="progress-bar" [style.width.%]="(ventasCompletadas / (totalVentas || 1)) * 100"></div>
      </div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="stat-card stat-warning">
      <div class="stat-icon">
        <i class="bi bi-clock-history"></i>
      </div>
      <div class="stat-content">
        <div class="stat-value">{{ ventasPendientes }}</div>
        <div class="stat-label">Pendientes</div>
        <div class="stat-badge" *ngIf="ventasPendientes > 0">
          <i class="bi bi-exclamation-triangle"></i>
          Requieren atención
        </div>
      </div>
      <div class="stat-ring">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" [attr.stroke-dasharray]="((ventasPendientes / (totalVentas || 1)) * 100) + ', 100'" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="percentage">{{ ((ventasPendientes / (totalVentas || 1)) * 100) | number:'1.0-0' }}%</text>
        </svg>
      </div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="stat-card stat-danger">
      <div class="stat-icon">
        <i class="bi bi-x-circle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-value">{{ ventasCanceladas }}</div>
        <div class="stat-label">Canceladas</div>
        <div class="stat-subtext">{{ montoCanceladas | currency:'':'':'1.0-0' }}</div>
      </div>
      <div class="stat-sparkline">
        <svg width="60" height="30" viewBox="0 0 60 30">
          <polyline points="0,15 10,10 20,25 30,5 40,20 50,8 60,12" stroke="#ef4444" fill="none" stroke-width="1.5" />
        </svg>
      </div>
    </div>
  </div>
</div>
